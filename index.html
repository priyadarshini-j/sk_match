<!DOCTYPE html>
<html>
<head>
<title>Cricket Birthday Pro</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b3d0b;
    font-family:Segoe UI;
    color:white;
}

/* Stadium */
.scene{
    width:950px;
    height:520px;
    position:relative;
    background:linear-gradient(to top,#145214,#1f7a1f);
    border-radius:20px;
    overflow:hidden;
}

/* Pitch */
.pitch{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#c2a36b;
}

/* Bowler */
#bowler{
    position:absolute;
    left:20px;
    bottom:120px;
    font-size:60px;
    transition:1s linear;
}

/* Ball */
#ball{
    position:absolute;
    left:120px;
    bottom:170px;
    font-size:18px;
}

/* Batsman */
#batsman{
    position:absolute;
    right:180px;
    bottom:120px;
    width:80px;
}

/* Bat swing */
.swing{
    transform:rotate(-35deg);
    transform-origin:80% 70%;
    transition:0.3s ease;
}

/* Ball hit */
@keyframes hit{
    0%{transform:translate(0,0);}
    50%{transform:translate(150px,-100px);}
    100%{transform:translate(350px,-200px);}
}

/* Cake */
#cake{
    display:none;
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    font-size:120px;
}

/* Message */
#msg{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

/* Button */
button{
    position:absolute;
    top:10px;
    left:10px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="scene">

<button onclick="start()">Start Match</button>

<div id="msg"></div>

<!-- Bowler -->
<div id="bowler">🏃‍♂️</div>

<!-- Ball -->
<div id="ball">⚪</div>

<!-- SVG Batsman -->
<svg id="batsman" viewBox="0 0 100 200">

    <!-- Head -->
    <circle cx="50" cy="25" r="12" fill="#ffe0bd"/>
    
    <!-- Jersey -->
    <rect x="35" y="35" width="30" height="45" fill="#1e90ff" rx="5"/>
    
    <!-- Jersey Text -->
    <text x="50" y="60" font-size="10" fill="white" text-anchor="middle">SK</text>
    <text x="50" y="72" font-size="8" fill="white" text-anchor="middle">18</text>
    
    <!-- Arms -->
    <line x1="35" y1="45" x2="20" y2="70" stroke="#ffe0bd" stroke-width="4"/>
    <line x1="65" y1="45" x2="80" y2="65" stroke="#ffe0bd" stroke-width="4"/>
    
    <!-- Legs -->
    <line x1="45" y1="80" x2="35" y2="120" stroke="white" stroke-width="4"/>
    <line x1="55" y1="80" x2="65" y2="120" stroke="white" stroke-width="4"/>
    
    <!-- Bat -->
    <line id="bat" x1="80" y1="65" x2="95" y2="20" stroke="#c68642" stroke-width="6"/>

</svg>

<!-- Cake -->
<div id="cake">🎂</div>

<!-- Ground -->
<div class="pitch"></div>

</div>

<script>

function start(){
    let bowler = document.getElementById("bowler");

    // Bowler running
    bowler.style.left = "150px";

    setTimeout(()=>{
        moveBall();
    },1000);
}

function moveBall(){
    let ball = document.getElementById("ball");
    let bat = document.getElementById("bat");

    let pos = 120;

    let move = setInterval(()=>{
        pos += 7;
        ball.style.left = pos + "px";

        if(pos > 620){
            clearInterval(move);

            // Bat swing
            bat.classList.add("swing");

            // Ball hit
            ball.style.animation="hit 1s forwards";

            document.getElementById("msg").innerHTML="💥 SIX!!!";

            setTimeout(()=>{
                showFinal();
            },1000);
        }
    },20);
}

function showFinal(){
    document.getElementById("cake").style.display="block";
    document.getElementById("msg").innerHTML="🎉 Happy Birthday SK 🎂";
}

</script>

</body>
</html>
